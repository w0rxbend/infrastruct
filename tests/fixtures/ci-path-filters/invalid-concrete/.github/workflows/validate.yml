---
name: Validate

"on":
  pull_request:

jobs:
  focused-change:
    runs-on: ubuntu-latest
    steps:
      - name: Check relevant paths
        shell: bash
        run: |
          changed_files="docs/missing.md"
          if grep -Eq '^(docs/missing\.md|tests/fixtures/example/.*)$' <<<"${changed_files}"; then
            echo "changed=true"
          else
            echo "changed=false"
          fi
