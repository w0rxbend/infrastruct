---
all:
  hosts:
    lab-node-01:
      hostname: lab-node-01
      ansible_host: 10.0.0.11
      architecture: arm64
      hardware_model: Raspberry Pi 4 Model B
      storage_type: ssd
      runtime_roles:
        - docker_host
      reliability_notes: Shared contract fixture host.
      placement_notes: Test rack.
      public_exposure:
        exposed: true
        services:
          - name: fixture
            protocol: tcp
            public_port: 443
            owner: fixture-proxy
            internal_target: lab-node-01:8443
        notes: Fixture public exposure.
  children:
    k3s_servers:
      hosts: {}
    k3s_agents:
      hosts: {}
    container_hosts:
      hosts:
        lab-node-01: {}
    swarm_managers:
      hosts: {}
    swarm_workers:
      hosts: {}
    edge_nodes:
      hosts: {}
    aarch64_hosts:
      hosts:
        lab-node-01: {}
    armv7:
      hosts: {}
    model_b_hosts:
      hosts:
        lab-node-01: {}
    flash_storage:
      hosts:
        lab-node-01: {}
    sdcard_storage:
      hosts: {}
    internet_facing:
      hosts:
        lab-node-01: {}
