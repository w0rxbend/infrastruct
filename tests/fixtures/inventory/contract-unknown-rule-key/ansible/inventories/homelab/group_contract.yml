---
contract_version: 1
required_groups:
  - k3s_servers
  - k3s_agents
  - docker_hosts
  - swarm_managers
  - swarm_workers
  - edge_nodes
  - arm64
  - armv7
  - pi_zero
  - ssd_storage
  - sdcard_storage
  - public_exposed
placement_rules:
  runtime_roles:
    host_var: runtime_roles
    host_var_type: list
    match: list_contains
    membership: exact
    groups:
      k3s_server: k3s_servers
      k3s_agent: k3s_agents
      docker_host: docker_hosts
      swarm_manager: swarm_managers
      swarm_worker: swarm_workers
      edge_node: edge_nodes
  runtime_rolez:
    host_var: runtime_roles
    host_var_type: list
    match: list_contains
    membership: exact
    groups:
      docker_host: docker_hosts
  architecture:
    host_var: architecture
    host_var_type: scalar
    match: scalar_equals
    membership: exact
    groups:
      arm64: arm64
      armv7: armv7
  storage:
    host_var: storage_type
    host_var_type: scalar
    match: scalar_equals
    membership: exact
    groups:
      ssd: ssd_storage
      sdcard: sdcard_storage
  raspberry_pi_zero:
    host_var: hardware_model
    host_var_type: scalar
    match: case_insensitive_substring
    substring: zero
    membership: exact
    group: pi_zero
  public_exposure:
    host_var: public_exposure
    host_var_type: mapping
    exposed_field: exposed
    exposed_field_type: boolean
    match: boolean_equals
    membership: exact
    group: public_exposed
