---
# SOPS policy for this repository.
#
# This file contains only age public recipients. Age private keys and decrypted
# outputs must stay outside Git. See secrets/README.md for the local-only
# workflow that uses ignored paths such as ~/.config/sops/age/keys.txt,
# secrets/local/, and secrets/decrypted/.
#
# Current operator-controlled age recipient:
#   age1k6na6pw9j55xpl7yc5x9l7twgmgfzcpjy5mmqzxav8w9afv2cqaskjsk4d

creation_rules:
  - path_regex: (^|.*/)secrets/.*\.(yaml|yml|json|env)$
    encrypted_regex: "^(data|stringData|values|env|secrets|password|token|key|secret)$"
    age: age1k6na6pw9j55xpl7yc5x9l7twgmgfzcpjy5mmqzxav8w9afv2cqaskjsk4d

  - path_regex: (^|.*/)ansible/.*(secret|vault|sops).*\.(yaml|yml)$
    encrypted_regex: "^(.*password.*|.*token.*|.*key.*|.*secret.*|data|stringData)$"
    age: age1k6na6pw9j55xpl7yc5x9l7twgmgfzcpjy5mmqzxav8w9afv2cqaskjsk4d

  - path_regex: (^|.*/)clusters/.*(secret|sops).*\.(yaml|yml)$
