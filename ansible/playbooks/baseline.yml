---
- name: Apply homelab baseline
  hosts: all
  gather_facts: true
  become: true

  roles:
    - role: inventory_assertions
      become: false
      tags:
        - inventory
        - assertions
    - role: common
      tags:
        - common
    - role: users
      tags:
        - users
    - role: ssh
      tags:
        - ssh
    - role: packages
      tags:
        - packages
    - role: firewall
      tags:
        - firewall
    - role: monitoring_agent
      tags:
        - monitoring
