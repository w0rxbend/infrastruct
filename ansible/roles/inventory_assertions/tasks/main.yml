---
- name: Load shared inventory group placement contract
  ansible.builtin.set_fact:
    inventory_group_contract: >-
      {{
        lookup(
          'ansible.builtin.file',
          role_path ~ '/../../inventories/homelab/group_contract.yml'
        ) | from_yaml
      }}
  changed_when: false

- name: Assert inventory assertion contract variables are available
  ansible.builtin.assert:
    that:
      - inventory_group_contract is mapping
      - inventory_group_contract.contract_version is defined
      - inventory_group_contract.placement_rules is mapping
      - inventory_group_contract.placement_rules.runtime_roles.host_var is string
      - inventory_group_contract.placement_rules.runtime_roles.groups is mapping
      - inventory_group_contract.placement_rules.architecture.host_var is string
      - inventory_group_contract.placement_rules.architecture.groups is mapping
      - inventory_group_contract.placement_rules.storage.host_var is string
      - inventory_group_contract.placement_rules.storage.groups is mapping
      - inventory_group_contract.placement_rules.raspberry_pi_zero.host_var is string
      - inventory_group_contract.placement_rules.raspberry_pi_zero.group is string
      - inventory_group_contract.placement_rules.raspberry_pi_zero.substring is string
      - inventory_group_contract.placement_rules.public_exposure.host_var is string
      - inventory_group_contract.placement_rules.public_exposure.group is string
      - inventory_group_contract.placement_rules.public_exposure.exposed_field is string
      - required_host_fields is defined
      - required_host_fields is sequence
      - required_host_fields is not string
      - allowed_architectures is defined
      - allowed_architectures is sequence
      - allowed_architectures is not string
      - allowed_storage_types is defined
      - allowed_storage_types is sequence
      - allowed_storage_types is not string
      - allowed_runtime_roles is defined
      - allowed_runtime_roles is sequence
      - allowed_runtime_roles is not string
      - public_exposure_required_fields is defined
      - public_exposure_required_fields is sequence
      - public_exposure_required_fields is not string
    fail_msg: >-
      Inventory assertion contract lists must be defined in inventory group
      vars before baseline roles can run.
    success_msg: "Inventory assertion contract lists are available."

- name: Set inventory assertion host variable contract names
  ansible.builtin.set_fact:
    inventory_runtime_roles_var: "{{ inventory_group_contract.placement_rules.runtime_roles.host_var }}"
    inventory_architecture_var: "{{ inventory_group_contract.placement_rules.architecture.host_var }}"
    inventory_storage_type_var: "{{ inventory_group_contract.placement_rules.storage.host_var }}"
    inventory_hardware_model_var: "{{ inventory_group_contract.placement_rules.raspberry_pi_zero.host_var }}"
    inventory_public_exposure_var: "{{ inventory_group_contract.placement_rules.public_exposure.host_var }}"
    inventory_public_exposure_exposed_field: "{{ inventory_group_contract.placement_rules.public_exposure.exposed_field }}"
    inventory_required_host_fields: >-
      {{
        (
          required_host_fields
          + [
            inventory_group_contract.placement_rules.runtime_roles.host_var,
            inventory_group_contract.placement_rules.architecture.host_var,
            inventory_group_contract.placement_rules.storage.host_var,
            inventory_group_contract.placement_rules.raspberry_pi_zero.host_var,
            inventory_group_contract.placement_rules.public_exposure.host_var
          ]
        ) | unique
      }}
  changed_when: false

- name: Assert required host inventory fields are present
  ansible.builtin.assert:
    that:
      - inventory_required_host_fields | difference(vars.keys() | list) | sort | length == 0
    fail_msg: >-
      {{ inventory_hostname }} is missing required inventory fields:
      {{ inventory_required_host_fields | difference(vars.keys() | list) | sort | join(', ') }}
    success_msg: "{{ inventory_hostname }} declares all required inventory fields."

- name: Assert host identity and placement metadata are valid
  ansible.builtin.assert:
    that:
      - hostname is string
      - hostname | trim | length > 0
      - inventory_hostname == hostname
      - ansible_host is string
      - ansible_host | trim | regex_search('^((25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\.){3}(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])$')
      - vars[inventory_architecture_var] is string
      - vars[inventory_architecture_var] in allowed_architectures
      - vars[inventory_hardware_model_var] is string
      - vars[inventory_hardware_model_var] | trim | length > 0
      - vars[inventory_storage_type_var] is string
      - vars[inventory_storage_type_var] in allowed_storage_types
      - reliability_notes is string
      - reliability_notes | trim | length > 0
      - placement_notes is string
      - placement_notes | trim | length > 0
    fail_msg: >-
      {{ inventory_hostname }} has invalid host identity, management IP,
      architecture, hardware, storage, reliability, or placement metadata.
    success_msg: "{{ inventory_hostname }} host identity and placement metadata are valid."

- name: Assert runtime roles are valid
  ansible.builtin.assert:
    that:
      - vars[inventory_runtime_roles_var] is sequence
      - vars[inventory_runtime_roles_var] is not string
      - vars[inventory_runtime_roles_var] is not mapping
      - vars[inventory_runtime_roles_var] | length > 0
      - vars[inventory_runtime_roles_var] | difference(allowed_runtime_roles) | length == 0
    fail_msg: >-
      {{ inventory_hostname }} must declare at least one supported runtime role.
      Unknown roles: {{ vars[inventory_runtime_roles_var] | default([]) | difference(allowed_runtime_roles | default([])) | join(', ') }}
    success_msg: "{{ inventory_hostname }} runtime roles are valid."

- name: Assert runtime role group placement matches metadata
  ansible.builtin.assert:
    that:
      - (item.key in vars[inventory_runtime_roles_var]) == (item.value in group_names)
    fail_msg: >-
      {{ inventory_hostname }} runtime group placement mismatch: runtime role
      {{ item.key }} maps to expected group {{ item.value }}, but
      {{ inventory_runtime_roles_var }}={{ vars[inventory_runtime_roles_var] | join(', ') }} and
      {{ item.value }} membership is {{ item.value in group_names }}.
    success_msg: >-
      {{ inventory_hostname }} runtime role {{ item.key }} placement matches
      {{ item.value }} membership.
  loop: "{{ runtime_role_groups | dict2items }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.value }}"
  vars:
    runtime_role_groups: "{{ inventory_group_contract.placement_rules.runtime_roles.groups }}"

- name: Assert architecture group placement matches metadata
  ansible.builtin.assert:
    that:
      - (vars[inventory_architecture_var] == item.key) == (item.value in group_names)
    fail_msg: >-
      {{ inventory_hostname }} architecture group placement mismatch:
      {{ inventory_architecture_var }}={{ vars[inventory_architecture_var] }} maps to expected group {{ item.value }}
      when metadata is {{ item.key }}, but {{ item.value }} membership is
      {{ item.value in group_names }}.
    success_msg: >-
      {{ inventory_hostname }} architecture {{ item.key }} placement matches
      {{ item.value }} membership.
  loop: "{{ architecture_groups | dict2items }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.value }}"
  vars:
    architecture_groups: "{{ inventory_group_contract.placement_rules.architecture.groups }}"

- name: Assert storage group placement matches metadata
  ansible.builtin.assert:
    that:
      - (vars[inventory_storage_type_var] == item.key) == (item.value in group_names)
    fail_msg: >-
      {{ inventory_hostname }} storage group placement mismatch:
      {{ inventory_storage_type_var }}={{ vars[inventory_storage_type_var] }} maps to expected group {{ item.value }}
      when metadata is {{ item.key }}, but {{ item.value }} membership is
      {{ item.value in group_names }}.
    success_msg: >-
      {{ inventory_hostname }} storage type {{ item.key }} placement matches
      {{ item.value }} membership.
  loop: "{{ storage_groups | dict2items }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.value }}"
  vars:
    storage_groups: "{{ inventory_group_contract.placement_rules.storage.groups }}"

- name: Assert Raspberry Pi Zero group placement matches hardware metadata
  ansible.builtin.assert:
    that:
      - >-
        ((inventory_group_contract.placement_rules.raspberry_pi_zero.substring | lower)
        in (vars[inventory_hardware_model_var] | lower)) ==
        (inventory_group_contract.placement_rules.raspberry_pi_zero.group in group_names)
    fail_msg: >-
      {{ inventory_hostname }} Raspberry Pi Zero group placement mismatch:
      {{ inventory_hardware_model_var }}={{ vars[inventory_hardware_model_var] }} requires
      {{ inventory_group_contract.placement_rules.raspberry_pi_zero.group }}
      membership only when hardware metadata contains
      {{ inventory_group_contract.placement_rules.raspberry_pi_zero.substring }},
      but {{ inventory_group_contract.placement_rules.raspberry_pi_zero.group }}
      membership is
      {{ inventory_group_contract.placement_rules.raspberry_pi_zero.group in group_names }}.
    success_msg: >-
      {{ inventory_hostname }} Raspberry Pi Zero placement matches hardware metadata.

- name: Assert public exposure metadata is valid
  ansible.builtin.assert:
    that:
      - vars[inventory_public_exposure_var] is mapping
      - public_exposure_required_fields | difference(vars[inventory_public_exposure_var].keys() | list) | length == 0
      - vars[inventory_public_exposure_var][inventory_public_exposure_exposed_field] is boolean
      - vars[inventory_public_exposure_var].services is sequence
      - vars[inventory_public_exposure_var].services is not string
      - vars[inventory_public_exposure_var].services is not mapping
      - vars[inventory_public_exposure_var].notes is string
      - vars[inventory_public_exposure_var].notes | trim | length > 0
      - not vars[inventory_public_exposure_var][inventory_public_exposure_exposed_field] or vars[inventory_public_exposure_var].services | length > 0
    fail_msg: >-
      {{ inventory_hostname }} must declare {{ inventory_public_exposure_var }}.{{ inventory_public_exposure_exposed_field }} as a
      boolean, {{ inventory_public_exposure_var }}.services as a list, and {{ inventory_public_exposure_var }}.notes as
      a non-empty string. Exposed hosts must declare at least one service.
    success_msg: "{{ inventory_hostname }} public exposure metadata is valid."

- name: Assert public exposure group placement matches metadata
  ansible.builtin.assert:
    that:
      - >-
        vars[inventory_public_exposure_var][inventory_public_exposure_exposed_field]
        ==
        (inventory_group_contract.placement_rules.public_exposure.group in group_names)
    fail_msg: >-
      {{ inventory_hostname }} public exposure group placement mismatch:
      {{ inventory_public_exposure_var ~ '.' ~ inventory_public_exposure_exposed_field ~ '=' ~ vars[inventory_public_exposure_var][inventory_public_exposure_exposed_field] }}
      requires matching
      {{ inventory_group_contract.placement_rules.public_exposure.group }} membership,
      but {{ inventory_group_contract.placement_rules.public_exposure.group }} membership is
      {{ inventory_group_contract.placement_rules.public_exposure.group in group_names }}.
    success_msg: >-
      {{ inventory_hostname }} {{ inventory_group_contract.placement_rules.public_exposure.group }}
      placement matches public exposure metadata.

- name: Assert public exposure service records are mappings
  ansible.builtin.assert:
    that:
      - item is mapping
    fail_msg: >-
      {{ inventory_hostname }} public exposure service record {{ ansible_loop.index }}
      must be a mapping.
    success_msg: >-
      {{ inventory_hostname }} public exposure service record {{ ansible_loop.index }}
      is a mapping.
  loop: "{{ vars[inventory_public_exposure_var].services }}"
  loop_control:
    extended: true
    label: "{{ item.name | default('service-' ~ ansible_loop.index) }}"

- name: Assert public exposure service records are complete
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name is string
      - item.name | trim | length > 0
      - item.protocol is defined
      - item.protocol is string
      - item.protocol | trim | length > 0
      - item.public_port is defined
      - item.public_port is not none
      - item.public_port != ''
      - item.owner is defined
      - item.owner is string
      - item.owner | trim | length > 0
      - item.internal_target is defined
      - item.internal_target is string
      - item.internal_target | trim | length > 0
    fail_msg: >-
      {{ inventory_hostname }} public exposure service record {{ ansible_loop.index }}
      must include non-empty name, protocol, public_port, owner, and
      internal_target fields.
    success_msg: >-
      {{ inventory_hostname }} public exposure service record {{ ansible_loop.index }}
      is complete.
  loop: "{{ vars[inventory_public_exposure_var].services }}"
  loop_control:
    extended: true
    label: "{{ item.name | default('service-' ~ ansible_loop.index) }}"
