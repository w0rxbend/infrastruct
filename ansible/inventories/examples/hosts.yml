---
# Non-production example inventory only.
# Do not use this file as the homelab source of truth.
all:
  hosts:
    homelab-example-k3s-server-01:
      hostname: homelab-example-k3s-server-01
      ansible_host: 192.0.2.11
      architecture: arm64
      hardware_model: Raspberry Pi 4 Model B
      storage_type: ssd
      runtime_roles:
        - k3s_server
        - docker_host
        - swarm_manager
        - edge_node
      reliability_notes: "Example only: replace with real power, network, cooling, and uptime notes."
      placement_notes: "Example only: preferred for control-plane or edge workloads after real SSD and power stability are confirmed."
      public_exposure:
        exposed: true
        services:
          - name: example-ingress
            protocol: tcp
            public_port: 443
            owner: planned-proxy
            internal_target: "replace-before-use"
        notes: "Example only: public exposure must also be documented in docs/public-exposure.md."
    homelab-example-k3s-agent-01:
      hostname: homelab-example-k3s-agent-01
      ansible_host: 192.0.2.12
      architecture: arm64
      hardware_model: Rock64
      storage_type: sdcard
      runtime_roles:
        - k3s_agent
        - docker_host
        - swarm_worker
      reliability_notes: "Example only: replace with real SD-card age, thermal, power, and network notes."
      placement_notes: "Example only: suitable for disposable or stateless workloads until storage reliability is proven."
      public_exposure:
        exposed: false
        services: []
        notes: "No public route in this placeholder entry."
    homelab-example-pizero-01:
      hostname: homelab-example-pizero-01
      ansible_host: 192.0.2.13
      architecture: armv7
      hardware_model: Raspberry Pi Zero 2 W
      storage_type: sdcard
      runtime_roles:
        - edge_node
      reliability_notes: "Example only: replace with real Wi-Fi, power, and low-memory constraints."
      placement_notes: "Example only: edge or lightweight utility duties only; avoid cluster control-plane placement."
      public_exposure:
        exposed: false
        services: []
        notes: "No public route in this placeholder entry."
  children:
    k3s_servers:
      hosts:
        homelab-example-k3s-server-01:
    k3s_agents:
      hosts:
        homelab-example-k3s-agent-01:
    docker_hosts:
      hosts:
        homelab-example-k3s-server-01:
        homelab-example-k3s-agent-01:
    swarm_managers:
      hosts:
        homelab-example-k3s-server-01:
    swarm_workers:
      hosts:
        homelab-example-k3s-agent-01:
    edge_nodes:
      hosts:
        homelab-example-k3s-server-01:
        homelab-example-pizero-01:
    arm64:
      hosts:
        homelab-example-k3s-server-01:
        homelab-example-k3s-agent-01:
    armv7:
      hosts:
        homelab-example-pizero-01:
    pi_zero:
      hosts:
        homelab-example-pizero-01:
    ssd_storage:
      hosts:
        homelab-example-k3s-server-01:
    sdcard_storage:
      hosts:
        homelab-example-k3s-agent-01:
        homelab-example-pizero-01:
    public_exposed:
      hosts:
        homelab-example-k3s-server-01:
